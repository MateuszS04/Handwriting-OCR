# --- Data ---
data:
  lines_dir: data/lines_merged
  splits_dir: data/splits           # expects train.jsonl / val.jsonl / test.jsonl
  gt_jsonl: data/gt_raw/gemini.jsonl
  # reviewed_jsonl: data/gt_reviewed/reviewed.jsonl   # optional, weighted higher
  min_confidence: 0.0               # drop Gemini lines below this score
  max_target_length: 128



# # --- Model ---
# model:
  base_checkpoint: microsoft/trocr-large-handwritten
  # extra characters appended to the tokenizer if not already present
  extra_chars: ["ą", "ć", "ę", "ł", "ń", "ó", "ś", "ź", "ż",
                "Ą", "Ć", "Ę", "Ł", "Ń", "Ó", "Ś", "Ź", "Ż"]
  freeze_encoder_epochs: 1          # freeze ViT for the first N epochs

